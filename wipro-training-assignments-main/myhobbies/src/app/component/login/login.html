<h2>{{title}}</h2>

<form (ngSubmit)="onLogin()" #loginForm="ngForm" class="login-form">

  <div class="form-group">
    <label>Username</label>
    <input
      type="text"
      name="username"
      [(ngModel)]="username"
      required
    />
  </div>

  <div class="form-group">
    <label>Password</label>
    <input
      type="password"
      name="password"
      [(ngModel)]="password"
      required
    />
  </div>

  <button type="submit">Login</button>

</form>

<h3>Hobbies</h3>
<ul>
  <li *ngFor="let hobby of myhobbies">
      {{hobby}}
  </li>
</ul>
